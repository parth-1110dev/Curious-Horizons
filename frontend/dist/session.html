<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>Curious Horizons - Session</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" media="print"
    onload="this.media='all'" />
  <noscript>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  </noscript>

  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script type="module" crossorigin src="/assets/session-B-rni0xY.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-Dezn_h7o.js">
  <link rel="modulepreload" crossorigin href="/assets/preload-helper-Czpn1I53.js">
  <link rel="modulepreload" crossorigin href="/assets/gsap-Bi_c5vh2.js">
  <link rel="modulepreload" crossorigin href="/assets/interactions-BwSpGar2.js">
  <link rel="modulepreload" crossorigin href="/assets/plan-state-DN7Bm0zS.js">
  <link rel="stylesheet" crossorigin href="/assets/session-BSNu3n_J.css">
  <link rel="stylesheet" crossorigin href="/assets/style-DcUimdm9.css">
  <link rel="stylesheet" crossorigin href="/assets/loading-vU8GxvVC.css">
</head>

<body>
  <div class="aurora" aria-hidden="true"></div>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="topbar-left">
        <div class="topic-badge">
          <span class="topic-badge-label">TOPIC:</span>
          <span id="topicDisplay" class="topic-badge-value">—</span>
        </div>
      </div>
      <div class="topbar-timer" aria-live="polite">
        <svg class="timer-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="9" />
          <path d="M12 7v5l3 2" />
        </svg>
        <span id="timerDisplay" class="timer-display">00:00</span>
      </div>
      <div class="topbar-right">
        <button id="exitBtn" class="exit-btn" type="button" aria-label="Exit session">
          EXIT
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main class="session-main">
    <section id="sessionScreen" class="screen">
      <div class="content-wrapper">
        <div class="content-card">
          <article class="ai-output" aria-label="AI instructor output">
            <div id="session-content" class="session-content"></div>
          </article>
        </div>
      </div>
    </section>

    <section id="completeScreen" class="screen screen-complete" hidden>
      <button id="homeBtn" class="back-btn" type="button" aria-label="Go to homepage" title="Home">
        ← Home
      </button>
      <div class="complete-card">
        <h1 class="complete-title">Session Complete.</h1>
        <p class="complete-subtitle">Knowledge synthesized successfully.</p>

        <div class="rating-block" aria-label="Session rating">
          <div class="rating-stars" role="radiogroup" aria-label="Select a rating from 1 to 5">
            <button class="star-btn" type="button" data-value="1" aria-label="Rate 1 star">★</button>
            <button class="star-btn" type="button" data-value="2" aria-label="Rate 2 stars">★</button>
            <button class="star-btn" type="button" data-value="3" aria-label="Rate 3 stars">★</button>
            <button class="star-btn" type="button" data-value="4" aria-label="Rate 4 stars">★</button>
            <button class="star-btn" type="button" data-value="5" aria-label="Rate 5 stars">★</button>
          </div>
        </div>

        <label for="feedbackBox" class="feedback-label">Optional Reflection</label>
        <textarea id="feedbackBox" class="feedback-box" rows="3"
          placeholder="What were your key takeaways from this session?"></textarea>

        <div class="complete-actions">
          <button id="startNewBtn" class="btn btn-primary" type="button">
            Start New Session
          </button>
          <button id="continueBtn" class="btn btn-primary" type="button">
            Continue Exploring
          </button>
        </div>

        <section class="knowledge-pack-section" aria-label="Archive Knowledge">
          <hr class="divider" />
          <h2 class="knowledge-pack-title">Archive Knowledge</h2>
          <p class="knowledge-pack-description">
            Preserve this session's insights as structured notes and revision material.
          </p>
          <button id="generateNotesBtn" class="btn btn-primary btn-usp knowledge-pack-btn" type="button">
            <span class="btn-usp-icon" aria-hidden="true">✦</span>
            Generate Archive
          </button>
        </section>
      </div>
    </section>
  </main>

</body>

</html>
